{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 580px; margin: 0 auto;">
  <h2 style="margin-top: 0;">Ingreso Seguro</h2>
  <p class="small">Iniciá sesión con Google. Solo usuarios autorizados en el panel podrán entrar.</p>

  <div class="row">
    <a class="btn primary" href="{{ url_for('auth_google') }}">Entrar con Google</a>
  </div>

  <p class="small" style="margin-top: 14px;">
    Si no podés ingresar, pedile a un administrador que agregue tu email en el panel de usuarios.
  </p>
</div>
{% endblock %}
